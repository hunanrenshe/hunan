<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖南人社</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white; /* 保持白底极简风格 */
        }
        .pdf-view {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- 单个PDF全屏展示，路径根据你的实际情况调整 -->
    <!-- 若PDF和HTML同目录（如GitHub仓库根目录），直接写文件名：src="湖南人社.pdf" -->
    <!-- 若用腾讯云公有读链接，保留下面的链接即可 -->
    <iframe class="pdf-view" src="湖南人社.pdf"></iframe>
</body>
</html>
