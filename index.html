<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 允许手机缩放，适配不同屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>湖南人社</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh; /* 允许页面滚动 */
            background-color: #fff;
            padding: 10px 0; /* 手机上下留边 */
        }
        .pdf-view {
            width: 95%; /* 左右留边，避免贴屏 */
            min-height: 90vh;
            border: none;
            display: block;
            margin: 0 auto; /* 居中展示 */
        }
    </style>
</head>
<body>
    <!-- 👇 核心修正：改为GitHub仓库内的PDF文件名（替换成你实际的文件名） -->
    <iframe class="pdf-view" src="湖南人社.pdf" scrolling="auto"></iframe>
</body>
</html>
