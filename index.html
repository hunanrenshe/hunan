<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 允许手机缩放，适配不同屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>湖南人社</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh; /* 允许页面滚动，适配多图片 */
            background-color: #fff;
            padding: 10px 0; /* 手机上下留边，避免贴屏 */
        }
        /* 图片容器：适配手机+电脑，居中展示 */
        .img-container {
            width: 95%; /* 左右留边，提升体验 */
            margin: 0 auto; /* 居中 */
        }
        /* 图片样式：自适应宽度，保留间距 */
        .content-img {
            display: block;
            width: 100%; /* 自适应容器宽度 */
            height: auto; /* 保持图片比例，不变形 */
            margin-bottom: 15px; /* 图片之间留间距 */
        }
        /* 最后一张图片去掉底部间距 */
        .content-img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="img-container">
        <!-- 3张湖南人社PNG图片，按顺序展示 -->
        <img src="湖南人社1.png" alt="湖南人社1" class="content-img">
        <img src="湖南人社2.png" alt="湖南人社2" class="content-img">
        <img src="湖南人社3.png" alt="湖南人社3" class="content-img">
    </div>
</body>
</html>
